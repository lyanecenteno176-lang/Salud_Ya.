{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SaludYa - Iniciar Sesión</title>

    <link rel="stylesheet" href="{% static 'saludya_app/css/styles.css' %}">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>🌱 SaludYa</h1>

        <h2>Iniciar sesión</h2>

        {% if error %}
            <p class="error-message">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <label>
                Usuario
            </label>

            <input 
                type="text" 
                name="username"
                placeholder="Ingresa tu usuario"
                required
            >

            <label>
                Contraseña
            </label>

            <input 
                type="password"
                name="password"
                placeholder="Ingresa tu contraseña"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>


        <p>
            ¿No tienes cuenta?
            <a href="{% url 'registro' %}">
                Regístrate
            </a>
        </p>

    </div>

</div>


</body>
</html>
