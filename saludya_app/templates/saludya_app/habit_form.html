<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if habit %}Editar hábito{% else %}Crear hábito{% endif %} - SaludYa</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'saludya_app/css/styles.css' %}">
</head>
<body style="background-color: var(--bg-light); padding: 2.5rem 0;">
    <div class="container" style="max-width: 540px; background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 18px 40px rgba(0,0,0,0.08);">
        <h1 style="color: var(--secondary-color); margin-bottom: 1rem;">{% if habit %}Editar hábito{% else %}Crear hábito{% endif %}</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Nombre del hábito</label>
                <input type="text" id="name" name="name" value="{{ habit.name|default_if_none:'' }}" required>
            </div>
            <div class="form-group">
                <label for="habit_type">Tipo de hábito</label>
                <select id="habit_type" name="habit_type" required>
                    <option value="hidratacion" {% if habit.habit_type == 'hidratacion' %}selected{% endif %}>Hidratación</option>
                    <option value="pausa_activa" {% if habit.habit_type == 'pausa_activa' %}selected{% endif %}>Pausa Activa</option>
                    <option value="medicacion" {% if habit.habit_type == 'medicacion' %}selected{% endif %}>Medicación</option>
                </select>
            </div>
            <div class="form-group">
                <label for="daily_goal">Meta diaria</label>
                <input type="number" step="0.1" id="daily_goal" name="daily_goal" value="{{ habit.daily_goal|default_if_none:'1.0' }}" required>
            </div>
            <div class="form-group">
                <label for="unit">Unidad</label>
                <input type="text" id="unit" name="unit" value="{{ habit.unit|default_if_none:'veces' }}" required>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
                <input type="checkbox" id="active" name="active" {% if habit and habit.active %}checked{% endif %}>
                <label for="active">Activo</label>
            </div>
            <button type="submit" class="btn-main">Guardar hábito</button>
        </form>
        <button onclick="window.location.href='{% url 'progreso' %}'" class="btn-secondary" style="margin-top: 1rem; width: 100%;">Volver al Panel</button>
    </div>
</body>
</html>
