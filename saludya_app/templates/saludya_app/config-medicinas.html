<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SaludYa - Control de Medicamentos</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'saludya_app/css/styles.css' %}">
</head>
<body style="background-color: var(--bg-light); padding: 3rem 0;">
    <script>
        // Bloqueo de seguridad: Verificar si el usuario ha iniciado sesión
        const usuarioActivo = localStorage.getItem('usuarioSaludYa');
        if (!usuarioActivo) {
            alert('Acceso restringido. Por favor, inicia sesión o regístrate presionando "Cuidar de mi hoy" para personalizar tus hábitos.');
            window.location.href = '{% url 'index' %}'; // Redirige de inmediato al inicio
        }
    </script>
    <div class="container" style="max-width: 600px; background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
        <h2 style="color: var(--secondary-color); margin-bottom: 1rem;">💊 Gestión Responsable de Medicación</h2>
        
        <!-- Bloque educativo con enfoque humano preventivo -->
        <div style="background-color: #ffebee; border-left: 5px solid var(--accent-color); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
            <h4 style="color: #c62828; margin-bottom: 0.2rem;">⚠️ Alerta de Prevención</h4>
            <p style="font-size: 0.9rem; color: #c62828;">Para evitar riesgos de toxicidad o sobredosis por olvido, nuestra plataforma bloquea la duplicación de alertas en intervalos menores a los recetados por tu médico.</p>
        </div>

        <form onsubmit="alert('Medicación registrada. SaludYa cuidará estrictamente tus horarios.'); window.location.href='/'; return false;">
            <div class="form-group" style="margin-bottom: 1.2rem;">
                <label style="font-weight: 600; display:block; margin-bottom: .4rem;">Nombre del Medicamento</label>
                <input type="text" placeholder="Ej. Paracetamol" required style="width: 100%; padding: .8rem; border: 2px solid #e0e0e0; border-radius: 10px;">
            </div>

            <div class="form-group" style="margin-bottom: 1.2rem;">
                <label style="font-weight: 600; display:block; margin-bottom: .4rem;">Dosis Exacta Recetada</label>
                <input type="text" placeholder="Ej. 500 mg o 1 tableta" required style="width: 100%; padding: .8rem; border: 2px solid #e0e0e0; border-radius: 10px;">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="font-weight: 600; display:block; margin-bottom: .4rem;">Intervalo de Seguridad Médico (Horas)</label>
                <input type="number" min="4" max="24" placeholder="Ej. Cada 8 horas" required style="width: 100%; padding: .8rem; border: 2px solid #e0e0e0; border-radius: 10px;">
            </div>

            <button type="submit" class="btn-main" style="border: none; width: 100%; padding: 1rem; border-radius: 10px; cursor: pointer; background-color: var(--secondary-color);">Activar Recordatorio Seguro</button>
        </form>
    </div>
</body>
</html>
